name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint / build / test / vulncheck
    runs-on: ubuntu-latest
    steps:
      - name: harden runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: lint (golangci-lint v2)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: build
        run: go build -trimpath ./...

      - name: test
        run: go test -race -shuffle=on -count=1 ./...

      - name: govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
